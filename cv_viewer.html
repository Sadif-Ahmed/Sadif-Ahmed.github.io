<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Sadif Ahmed | Curriculum Vitae</title>
  <meta name="description" content="View and download the CV of Sadif Ahmed."/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
<nav class="navbar">
  <a href="index.html" class="nav-brand">Sadif<span>.Ahmed</span></a>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="experience.html">Research</a></li>
    <li><a href="education.html">Education</a></li>
    <li><a href="skills.html">Skills</a></li>
    <li><a href="projects.html">Projects</a></li>
    <li><a href="references.html">References</a></li>
    <li><a href="cv_viewer.html">CV</a></li>
  </ul>
  <div class="nav-right">
    <button class="theme-btn" id="theme-toggle">☀️ <span>Light</span></button>
  </div>
</nav>

<main>
  <section class="section" style="padding-bottom:20px">
    <div class="container">
      <div class="section-label">Document</div>
      <h1 class="section-title">Curriculum Vitae</h1>
      <div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:24px">
        <a href="assets/Sadif_Ahmed_CV.pdf" download class="btn btn-primary">⬇ Download PDF</a>
        <a href="assets/Sadif_Ahmed_CV.pdf" target="_blank" rel="noopener" class="btn btn-outline">↗ Open in New Tab</a>
      </div>
    </div>
  </section>

  <div id="pdf-container">
    <iframe src="assets/Sadif_Ahmed_CV.pdf" title="Sadif Ahmed Academic CV" loading="lazy">
      <p>Your browser does not support iframes.
        <a href="assets/Sadif_Ahmed_CV.pdf" target="_blank">Download the CV</a> instead.
      </p>
    </iframe>
  </div>
</main>

<footer class="footer" style="margin-top:32px">
  <p>© 2026 Sadif Ahmed · Dhaka, Bangladesh 🇧🇩</p>
</footer>

<script>
  const btn=document.getElementById('theme-toggle');
  const html=document.documentElement;
  const saved=localStorage.getItem('sa-theme')||'dark';
  html.setAttribute('data-theme',saved);
  upBtn(saved);
  btn.addEventListener('click',()=>{const n=html.getAttribute('data-theme')==='dark'?'light':'dark';html.setAttribute('data-theme',n);localStorage.setItem('sa-theme',n);upBtn(n);});
  function upBtn(t){btn.innerHTML=t==='dark'?'☀️ <span>Light</span>':'🌙 <span>Dark</span>';}
  const cur=location.pathname.split('/').pop()||'index.html';
  document.querySelectorAll('.nav-links a').forEach(a=>{if(a.getAttribute('href')===cur)a.classList.add('active');});
</script>
</body>
</html>
